<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>The Season</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    /* ── Rotate prompt ─────────────────────────────────────── */
    #rotate-prompt {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 900;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      gap: 28px;
      text-align: center;
      padding: 40px;
    }

    #rotate-prompt svg {
      animation: wobble 2.2s ease-in-out infinite;
      opacity: 0.85;
    }

    #rotate-prompt p {
      font-size: 13px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      opacity: 0.55;
    }

    @keyframes wobble {
      0%   { transform: rotate(0deg); }
      40%  { transform: rotate(90deg); }
      60%  { transform: rotate(90deg); }
      100% { transform: rotate(0deg); }
    }

    /* ── Scene wrapper ─────────────────────────────────────── */
    #scene {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    /* ── Scrolling track ───────────────────────────────────── */
    #track {
      display: flex;
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      will-change: transform;
    }

    /* ── Individual panels ─────────────────────────────────── */
    .panel {
      position: relative;
      height: 100%;
      aspect-ratio: 4 / 5;
      flex-shrink: 0;
      cursor: pointer;
      overflow: hidden;
      user-select: none;
    }

    /* Subtle separator line */
    .panel + .panel::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 1px;
      background: rgba(255,255,255,0.12);
      z-index: 5;
    }

    /* Hover scrim — lightens the tint slightly on hover */
    .panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.15);
      transition: background 0.4s ease;
      z-index: 3;
    }

    .panel:hover::after { background: rgba(0,0,0,0); }

    /* Video or canvas fills the panel */
    .panel video,
    .panel canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    /* YouTube iframe — oversized & centered to cover the 4:5 panel */
    .yt-frame {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      height: 100%;
      width: 222%;   /* covers 4:5 panel with 16:9 video: (16/9)÷(4/5) ≈ 2.22 */
      border: none;
      pointer-events: none;
      z-index: 0;
    }

    /* Color tint overlay — sits above video, below scrim */
    .panel-tint {
      position: absolute;
      inset: 0;
      z-index: 1;
      transition: opacity 0.4s ease;
    }

    .panel:hover .panel-tint { opacity: 0.75; }

    /* Company label — bottom-left */
    .panel-label {
      position: absolute;
      bottom: 36px;
      left: 36px;
      z-index: 4;
      color: #fff;
    }

    .panel-label .name {
      font-size: clamp(13px, 1.4vh, 20px);
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0.92;
    }

    .panel-label .role {
      margin-top: 5px;
      font-size: clamp(10px, 1vh, 13px);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.42;
    }

    /* ── Logo ──────────────────────────────────────────────── */
    #logo {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 100;
      pointer-events: none;
      text-align: center;
    }

    #logo img {
      display: block;
      width: clamp(100px, 14vw, 220px);
      filter: brightness(0) invert(1) drop-shadow(0 2px 32px rgba(0,0,0,0.7));
    }

    #logo .wordmark {
      font-size: clamp(16px, 2.4vw, 38px);
      font-weight: 200;
      letter-spacing: 0.55em;
      text-transform: uppercase;
      color: #fff;
      text-shadow: 0 0 40px rgba(0,0,0,0.9), 0 2px 8px rgba(0,0,0,0.6);
    }
  </style>
</head>
<body>

<!-- Rotate prompt (portrait mobile only) -->
<div id="rotate-prompt">
  <svg width="56" height="56" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="10" y="4" width="28" height="48" rx="5" stroke="white" stroke-width="2" fill="none"/>
    <circle cx="24" cy="46" r="2" fill="white"/>
    <path d="M38 16 C48 16, 52 24, 48 32" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
    <polyline points="48,26 48,32 42,32" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </svg>
  <p>Rotate to landscape</p>
</div>

<!-- Main scene -->
<div id="scene">
  <div id="track"></div>

  <div id="logo">
    <img
      src="https://i0.wp.com/theseason.nyc/wp-content/uploads/2026/03/width_800-1.png?w=800&ssl=1"
      alt="The Season"
      onerror="this.style.display='none'; document.getElementById('wordmark').style.display='block';"
    >
    <div id="wordmark" class="wordmark" style="display:none;">The Season</div>
  </div>
</div>

<script>
  // ─────────────────────────────────────────────────────────────
  //  Panel definitions
  //  video: set to a local file path when you have real footage
  //  anim: canvas animation style used as placeholder
  //  tint: semi-transparent color overlay above the visual
  // ─────────────────────────────────────────────────────────────
  const PANELS = [
    {
      id: 'producing',
      name: 'Producing',
      role: 'Executive & creative production',
      video: null,
      anim: 'bokeh',
      tint: 'rgba(0, 0, 0, 0.40)',
      href: '#producing',
    },
    {
      id: '11oclock',
      name: '11 O\'Clock Studio',
      role: 'Key art & branding',
      video: null,
      anim: 'ink',
      tint: 'rgba(225, 145, 10, 0.38)',
      href: '#11oclock',
    },
    {
      id: 'relay',
      name: 'Relay',
      role: 'Influencer agency',
      video: null,
      anim: 'network',
      tint: 'rgba(95, 18, 175, 0.38)',
      href: '#relay',
    },
    {
      id: 'flyer',
      name: 'Flyer',
      role: 'Creative production',
      video: null,
      anim: 'streaks',
      tint: 'rgba(18, 125, 55, 0.35)',
      href: '#flyer',
    },
  ];

  // ─────────────────────────────────────────────────────────────
  //  Canvas animations (placeholder until real video is supplied)
  // ─────────────────────────────────────────────────────────────

  // Producing — drifting starfield/dust on deep black
  function animBokeh(canvas) {
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    ctx.fillStyle = '#03030a';
    ctx.fillRect(0, 0, W, H);
    const stars = Array.from({ length: 120 }, () => ({
      x: Math.random() * W, y: Math.random() * H,
      r: 0.5 + Math.random() * 2.5,
      vy: 0.08 + Math.random() * 0.25,
      a: 0.4 + Math.random() * 0.6,
    }));
    // A few large soft bokeh orbs
    const orbs = Array.from({ length: 6 }, () => ({
      x: Math.random() * W, y: Math.random() * H,
      r: 80 + Math.random() * 160,
      vx: (Math.random() - 0.5) * 0.15,
      vy: (Math.random() - 0.5) * 0.15,
      a: 0.06 + Math.random() * 0.08,
    }));
    (function draw() {
      ctx.fillStyle = 'rgba(3,3,10,0.15)';
      ctx.fillRect(0, 0, W, H);
      orbs.forEach(o => {
        o.x += o.vx; o.y += o.vy;
        if (o.x < -o.r) o.x = W + o.r; if (o.x > W + o.r) o.x = -o.r;
        if (o.y < -o.r) o.y = H + o.r; if (o.y > H + o.r) o.y = -o.r;
        const g = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, o.r);
        g.addColorStop(0, `rgba(160,160,255,${o.a})`);
        g.addColorStop(1, 'transparent');
        ctx.beginPath(); ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2);
        ctx.fillStyle = g; ctx.fill();
      });
      stars.forEach(s => {
        s.y += s.vy;
        if (s.y > H + 2) { s.y = -2; s.x = Math.random() * W; }
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(220,220,255,${s.a})`; ctx.fill();
      });
      requestAnimationFrame(draw);
    })();
  }

  // 11 O'Clock — sweeping golden light rays from a central point
  function animInk(canvas) {
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    let t = 0;
    const cx = W * 0.5, cy = H * 0.38;
    const rays = Array.from({ length: 10 }, (_, i) => ({
      angle: (i / 10) * Math.PI * 2,
      speed: 0.0004 + Math.random() * 0.0003,
      len: 300 + Math.random() * 300,
      width: 30 + Math.random() * 60,
      a: 0.06 + Math.random() * 0.10,
    }));
    (function draw() {
      t++;
      ctx.fillStyle = 'rgba(8,5,0,0.30)';
      ctx.fillRect(0, 0, W, H);
      rays.forEach(r => {
        r.angle += r.speed;
        const ex = cx + Math.cos(r.angle) * r.len;
        const ey = cy + Math.sin(r.angle) * r.len;
        const g = ctx.createLinearGradient(cx, cy, ex, ey);
        g.addColorStop(0, `rgba(255,200,40,${r.a * 3})`);
        g.addColorStop(0.4, `rgba(220,150,10,${r.a})`);
        g.addColorStop(1, 'transparent');
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(r.angle);
        ctx.beginPath();
        ctx.moveTo(0, -r.width / 2);
        ctx.lineTo(r.len, -r.width);
        ctx.lineTo(r.len, r.width);
        ctx.lineTo(0, r.width / 2);
        ctx.closePath();
        ctx.fillStyle = g;
        ctx.fill();
        ctx.restore();
      });
      // Bright center glow
      const gc = ctx.createRadialGradient(cx, cy, 0, cx, cy, 120);
      gc.addColorStop(0, 'rgba(255,220,80,0.35)');
      gc.addColorStop(1, 'transparent');
      ctx.beginPath(); ctx.arc(cx, cy, 120, 0, Math.PI * 2);
      ctx.fillStyle = gc; ctx.fill();
      requestAnimationFrame(draw);
    })();
  }

  // Relay — bouncing nodes with glowing connection lines
  function animNetwork(canvas) {
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    ctx.fillStyle = '#050010';
    ctx.fillRect(0, 0, W, H);
    const nodes = Array.from({ length: 30 }, () => ({
      x: Math.random() * W, y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.8,
      vy: (Math.random() - 0.5) * 0.8,
      r: 2 + Math.random() * 4,
      pulse: Math.random() * Math.PI * 2,
    }));
    const DIST = 180;
    (function draw() {
      ctx.fillStyle = 'rgba(5,0,16,0.20)';
      ctx.fillRect(0, 0, W, H);
      nodes.forEach(n => {
        n.x += n.vx; n.y += n.vy; n.pulse += 0.04;
        if (n.x < 0 || n.x > W) n.vx *= -1;
        if (n.y < 0 || n.y > H) n.vy *= -1;
      });
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const dx = nodes[i].x - nodes[j].x, dy = nodes[i].y - nodes[j].y;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < DIST) {
            const strength = 1 - d / DIST;
            ctx.beginPath();
            ctx.moveTo(nodes[i].x, nodes[i].y);
            ctx.lineTo(nodes[j].x, nodes[j].y);
            ctx.strokeStyle = `rgba(180,100,255,${strength * 0.7})`;
            ctx.lineWidth = strength * 2;
            ctx.stroke();
          }
        }
      }
      nodes.forEach(n => {
        const pulse = 0.6 + 0.4 * Math.sin(n.pulse);
        const gr = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r * 4);
        gr.addColorStop(0, `rgba(220,160,255,${pulse})`);
        gr.addColorStop(1, 'transparent');
        ctx.beginPath(); ctx.arc(n.x, n.y, n.r * 4, 0, Math.PI * 2);
        ctx.fillStyle = gr; ctx.fill();
        ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(240,200,255,${pulse})`; ctx.fill();
      });
      requestAnimationFrame(draw);
    })();
  }

  // Flyer — fast horizontal streaks shooting left to right
  function animStreaks(canvas) {
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    ctx.fillStyle = '#010c04';
    ctx.fillRect(0, 0, W, H);
    const streaks = Array.from({ length: 30 }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      len: 60 + Math.random() * 200,
      speed: 4 + Math.random() * 8,
      width: 0.5 + Math.random() * 2,
      a: 0.5 + Math.random() * 0.5,
    }));
    (function draw() {
      ctx.fillStyle = 'rgba(1,12,4,0.25)';
      ctx.fillRect(0, 0, W, H);
      streaks.forEach(s => {
        s.x += s.speed;
        if (s.x > W + s.len) { s.x = -s.len; s.y = Math.random() * H; }
        const g = ctx.createLinearGradient(s.x - s.len, s.y, s.x, s.y);
        g.addColorStop(0, 'transparent');
        g.addColorStop(0.7, `rgba(60,200,100,${s.a * 0.4})`);
        g.addColorStop(1, `rgba(120,255,160,${s.a})`);
        ctx.beginPath();
        ctx.moveTo(s.x - s.len, s.y);
        ctx.lineTo(s.x, s.y);
        ctx.strokeStyle = g;
        ctx.lineWidth = s.width;
        ctx.stroke();
      });
      requestAnimationFrame(draw);
    })();
  }

  const ANIM_FNS = { bokeh: animBokeh, ink: animInk, network: animNetwork, streaks: animStreaks };

  // ─────────────────────────────────────────────────────────────
  //  YouTube helpers
  // ─────────────────────────────────────────────────────────────
  function getStoredVideos() {
    try { return JSON.parse(localStorage.getItem('tsv_videos') || '{}'); }
    catch { return {}; }
  }

  function extractYouTubeId(input) {
    if (!input) return null;
    input = input.trim();
    if (/^[a-zA-Z0-9_-]{11}$/.test(input)) return input;
    const m = input.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    return m ? m[1] : null;
  }

  // Panels waiting for the YT API to be ready
  const pendingYTPlayers = [];

  function fallbackToCanvas(container, animFn) {
    const cvs = document.createElement('canvas');
    cvs.width = 800; cvs.height = 1000;
    cvs.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;';
    container.insertBefore(cvs, container.firstChild);
    requestAnimationFrame(() => animFn(cvs));
  }

  // Called by YouTube IFrame API once loaded
  window.onYouTubeIframeAPIReady = function () {
    pendingYTPlayers.forEach(({ mountDiv, videoId, panel, animFn }) => {
      new YT.Player(mountDiv, {
        videoId,
        playerVars: {
          autoplay: 1, mute: 1, loop: 1, playlist: videoId,
          controls: 0, showinfo: 0, rel: 0, iv_load_policy: 3,
          modestbranding: 1, playsinline: 1,
        },
        events: {
          onReady: e => e.target.playVideo(),
          onError: () => {
            // Remove failed player and show canvas animation
            const iframe = panel.querySelector('iframe');
            if (iframe) iframe.remove();
            fallbackToCanvas(panel, animFn);
          },
        },
      });
    });
  };

  // Seconds for content to travel one full viewport width
  const SECS_PER_VIEWPORT = 35;

  // Panel aspect ratio (must match CSS)
  const PANEL_RATIO = 4 / 5;

  // ─────────────────────────────────────────────────────────────
  //  Build panels (doubled for seamless loop)
  // ─────────────────────────────────────────────────────────────
  const track = document.getElementById('track');

  function createPanel(p) {
    const el = document.createElement('div');
    el.className = 'panel';
    el.dataset.id = p.id;
    el.setAttribute('role', 'button');
    el.setAttribute('tabindex', '0');
    el.setAttribute('aria-label', `${p.name} — ${p.role}`);

    // Priority: YouTube (from admin) → local video → canvas animation
    const stored = getStoredVideos();
    const ytId = extractYouTubeId(stored[p.id]);
    if (ytId) {
      // Mount div for YT IFrame API — queued until API is ready
      const mountDiv = document.createElement('div');
      mountDiv.style.cssText = 'position:absolute;top:0;left:50%;transform:translateX(-50%);height:100%;width:222%;z-index:0;background:#000;';
      el.appendChild(mountDiv);
      pendingYTPlayers.push({ mountDiv, videoId: ytId, panel: el, animFn: ANIM_FNS[p.anim] });
    } else if (p.video) {
      const vid = document.createElement('video');
      vid.src = p.video;
      vid.autoplay = true; vid.muted = true; vid.loop = true; vid.playsInline = true;
      el.appendChild(vid);
    } else {
      const cvs = document.createElement('canvas');
      cvs.width = 800; cvs.height = 1000;
      el.appendChild(cvs);
      requestAnimationFrame(() => ANIM_FNS[p.anim](cvs));
    }

    // Color tint overlay
    const tint = document.createElement('div');
    tint.className = 'panel-tint';
    tint.style.background = p.tint;
    el.appendChild(tint);

    // Label
    const label = document.createElement('div');
    label.className = 'panel-label';
    label.innerHTML = `
      <div class="name">${p.name}</div>
      <div class="role">${p.role}</div>
    `;
    el.appendChild(label);

    el.addEventListener('click', () => handleClick(p));
    el.addEventListener('keydown', e => { if (e.key === 'Enter') handleClick(p); });

    return el;
  }

  function handleClick(p) {
    if (p.href && !p.href.startsWith('#')) {
      window.open(p.href, '_blank');
    } else {
      console.log('Panel clicked:', p.name);
    }
  }

  [...PANELS, ...PANELS].forEach(p => track.appendChild(createPanel(p)));

  // Load YT IFrame API if there are queued players and we're on HTTP
  if (pendingYTPlayers.length > 0) {
    if (window.location.protocol === 'file:') {
      // file:// blocks YouTube — fall straight to canvas for all queued panels
      pendingYTPlayers.forEach(({ mountDiv, panel, animFn }) => {
        mountDiv.remove();
        fallbackToCanvas(panel, animFn);
      });
      pendingYTPlayers.length = 0;
    } else {
      const s = document.createElement('script');
      s.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(s);
    }
  }

  // ─────────────────────────────────────────────────────────────
  //  Animation
  //  Panel width = height × PANEL_RATIO  (4:5 → 0.8 × vh)
  //  Total loop distance = PANELS.length × panel width
  //  Speed = viewportWidth / SECS_PER_VIEWPORT
  // ─────────────────────────────────────────────────────────────
  function startAnimation() {
    const vh = window.innerHeight;
    const vw = window.innerWidth;
    const panelWidth = vh * PANEL_RATIO;
    const totalPx = PANELS.length * panelWidth;
    const speedPxPerSec = vw / SECS_PER_VIEWPORT;
    const duration = totalPx / speedPxPerSec;

    track.style.animation = 'none';
    track.style.transform = 'translateX(0)';
    void track.offsetWidth;

    let styleTag = document.getElementById('anim-style');
    if (!styleTag) {
      styleTag = document.createElement('style');
      styleTag.id = 'anim-style';
      document.head.appendChild(styleTag);
    }
    styleTag.textContent = `
      @keyframes scroll {
        from { transform: translateX(0); }
        to   { transform: translateX(-${totalPx.toFixed(2)}px); }
      }
    `;

    track.style.animation = `scroll ${duration.toFixed(2)}s linear infinite`;
  }

  startAnimation();

  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      startAnimation();
      checkOrientation();
    }, 150);
  });

  // ─────────────────────────────────────────────────────────────
  //  Mobile orientation guard
  // ─────────────────────────────────────────────────────────────
  const rotatePrompt = document.getElementById('rotate-prompt');

  function checkOrientation() {
    const portrait = window.innerHeight > window.innerWidth;
    const mobile = window.innerWidth < 1024 ||
                   /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    rotatePrompt.style.display = (mobile && portrait) ? 'flex' : 'none';
  }

  window.addEventListener('orientationchange', () => {
    setTimeout(() => { startAnimation(); checkOrientation(); }, 300);
  });

  checkOrientation();
</script>

</body>
</html>
