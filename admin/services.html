<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Services — The Season Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --yellow: #FDB913;
  --black: #000;
  --white: #FFF;
  --gray-50: #FAFAFA;
  --gray-100: #F4F4F4;
  --gray-200: #E8E8E8;
  --gray-300: #D0D0D0;
  --gray-500: #888;
  --gray-700: #444;
  --gray-900: #1A1A1A;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--gray-50); color: var(--gray-900); font-family: 'Source Sans 3', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
body { min-height: 100vh; }

/* Gate */
#gate { position: fixed; inset: 0; background: var(--black); color: var(--white); display: flex; align-items: center; justify-content: center; z-index: 9999; }
#gate.hidden { display: none; }
.gate-box { width: min(420px, 90vw); text-align: center; }
.gate-box h1 { font-size: 14px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--yellow); margin-bottom: 24px; }
.gate-box input { width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.3); color: var(--white); padding: 12px 0; font-size: 18px; font-family: inherit; text-align: center; outline: none; }
.gate-box input:focus { border-bottom-color: var(--yellow); }
.gate-box button { margin-top: 20px; background: var(--yellow); color: var(--black); border: none; padding: 12px 32px; font-family: inherit; font-weight: 600; font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; border-radius: 2px; }
.gate-err { color: #ff6b6b; font-size: 13px; margin-top: 12px; min-height: 18px; }

/* Adminbar */
.adminbar { background: var(--black); color: var(--white); padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.adminbar-left { display: flex; align-items: center; gap: 20px; }
.adminbar .badge { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--yellow); font-weight: 600; }
.adminbar .sep { color: var(--gray-700); }
.adminbar nav { display: flex; gap: 18px; }
.adminbar nav a { color: rgba(255,255,255,0.5); font-size: 13px; text-decoration: none; padding: 4px 0; transition: color 0.15s; }
.adminbar nav a.active { color: var(--white); border-bottom: 2px solid var(--yellow); }
.adminbar nav a:hover { color: var(--white); }
.adminbar-right { display: flex; align-items: center; gap: 14px; font-size: 12px; color: rgba(255,255,255,0.5); }

main { max-width: 1240px; margin: 0 auto; padding: 36px 28px 80px; }

.page-head { display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 18px; margin-bottom: 28px; }
.page-head h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.01em; }
.page-head .sub { color: var(--gray-500); font-size: 14px; margin-top: 4px; max-width: 540px; }
.btn-primary { background: var(--black); color: var(--white); border: none; padding: 14px 22px; font-family: inherit; font-weight: 600; font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; border-radius: 2px; display: inline-flex; align-items: center; gap: 8px; text-decoration: none; }
.btn-primary:hover { background: var(--yellow); color: var(--black); }
.btn-primary .plus { font-size: 18px; line-height: 1; }

/* Toolbar */
.toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 24px; flex-wrap: wrap; }
.search { flex: 1; min-width: 240px; max-width: 360px; position: relative; }
.search input { width: 100%; background: var(--white); border: 1px solid var(--gray-200); padding: 11px 14px 11px 38px; font-family: inherit; font-size: 14px; border-radius: 2px; outline: none; transition: border-color 0.15s; }
.search input:focus { border-color: var(--gray-500); }
.search::before { content: "⌕"; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--gray-500); font-size: 18px; }
.chips { display: flex; gap: 6px; flex-wrap: wrap; }
.chip { background: var(--white); border: 1px solid var(--gray-200); padding: 8px 14px; font-size: 12px; font-weight: 600; letter-spacing: 0.04em; cursor: pointer; border-radius: 100px; color: var(--gray-700); transition: all 0.15s; }
.chip:hover { border-color: var(--gray-500); }
.chip.active { background: var(--black); color: var(--white); border-color: var(--black); }
.chip .count { opacity: 0.55; margin-left: 6px; font-weight: 400; }

/* Company groups */
.co-group { margin-bottom: 36px; }
.co-group.hidden { display: none; }
.co-header { display: flex; align-items: baseline; gap: 14px; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--gray-200); }
.co-header h2 { font-size: 18px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
.co-header .cat { font-size: 12px; color: var(--gray-500); letter-spacing: 0.06em; text-transform: uppercase; }
.co-header .count-badge { margin-left: auto; font-size: 12px; color: var(--gray-500); }

.svc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }
.svc-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: 4px; padding: 18px 20px; display: flex; flex-direction: column; gap: 10px; transition: border-color 0.15s, transform 0.1s; cursor: pointer; position: relative; }
.svc-card:hover { border-color: var(--gray-500); }
.svc-card.default-tag::after { content: "DEFAULT"; position: absolute; top: 14px; right: 14px; font-size: 9px; font-weight: 600; letter-spacing: 0.12em; color: var(--yellow); }
.svc-name { font-size: 16px; font-weight: 600; padding-right: 60px; }
.svc-desc { font-size: 13px; color: var(--gray-700); line-height: 1.45; }
.svc-meta { display: flex; align-items: center; justify-content: space-between; margin-top: auto; padding-top: 8px; border-top: 1px solid var(--gray-100); }
.svc-rate { font-weight: 700; font-size: 16px; }
.svc-rate .from { font-weight: 400; font-size: 11px; color: var(--gray-500); margin-right: 4px; letter-spacing: 0.06em; text-transform: uppercase; }
.svc-uses { font-size: 11px; color: var(--gray-500); letter-spacing: 0.04em; text-transform: uppercase; }
.svc-actions { display: flex; gap: 6px; margin-top: 4px; }
.svc-actions button { background: transparent; border: 1px solid var(--gray-200); padding: 5px 10px; font-size: 11px; font-family: inherit; font-weight: 600; letter-spacing: 0.04em; color: var(--gray-700); cursor: pointer; border-radius: 2px; transition: all 0.12s; text-transform: uppercase; }
.svc-actions button:hover { background: var(--black); color: var(--white); border-color: var(--black); }

.empty { padding: 60px 24px; text-align: center; color: var(--gray-500); background: var(--white); border: 1px solid var(--gray-200); border-radius: 4px; }
.empty.hidden { display: none; }

/* Mobile */
@media (max-width: 720px) {
  .adminbar { padding: 12px 16px; flex-wrap: wrap; gap: 10px; }
  .adminbar nav { gap: 14px; }
  .adminbar-right { display: none; }
  main { padding: 24px 16px 60px; }
  .page-head h1 { font-size: 24px; }
  .btn-primary { padding: 11px 16px; font-size: 12px; }
  .toolbar { flex-direction: column; align-items: stretch; }
  .search { max-width: none; }
  .svc-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div id="gate">
  <div class="gate-box">
    <h1>The Season — Admin</h1>
    <form id="gate-form">
      <input id="gate-pw" type="password" placeholder="Password" autocomplete="off">
      <div class="gate-err" id="gate-err"></div>
      <button type="submit">Unlock</button>
    </form>
  </div>
</div>

<div class="adminbar">
  <div class="adminbar-left">
    <span class="badge">★ Admin</span>
    <span class="sep">/</span>
    <nav>
      <a href="/admin/proposals">Proposals</a>
      <a href="/admin/services" class="active">Services</a>
      <a href="#">References</a>
      <a href="#">Contacts</a>
    </nav>
  </div>
  <div class="adminbar-right">
    <span>theseason.nyc</span>
    <span class="sep">·</span>
    <a href="/" style="color: rgba(255,255,255,0.7); text-decoration: none;">View site →</a>
  </div>
</div>

<main>
  <div class="page-head">
    <div>
      <h1>Service Catalog</h1>
      <div class="sub">Default deliverables and rates by company. The builder pulls from here when you add a service to a proposal — duplicate or tweak as needed.</div>
    </div>
    <button class="btn-primary"><span class="plus">+</span> New Service</button>
  </div>

  <div class="toolbar">
    <div class="search">
      <input type="text" id="search" placeholder="Search by service, deliverable, or keyword…">
    </div>
    <div class="chips" id="filter-chips"></div>
  </div>

<div id="groups-root"></div>
  <div class="empty hidden" id="empty">No services match these filters.</div>
</main>

<script src="/admin/admin-api.js"></script>
<script>
const search = document.getElementById('search');
const empty = document.getElementById('empty');
const root = document.getElementById('groups-root');
const chipsWrap = document.getElementById('filter-chips');
let SERVICES = [], COMPANIES = [], activeFilter = 'all';

initGate(load);

async function load() {
  try {
    const [svc, cos] = await Promise.all([
      apiGet('/api/admin/catalog?type=services'),
      apiGet('/api/admin/catalog?type=companies'),
    ]);
    SERVICES = svc;
    COMPANIES = cos.sort((a, b) => (a.sort || 0) - (b.sort || 0));
    renderChips();
    render();
  } catch (e) {
    root.innerHTML = `<div class="empty">Couldn't load services — ${escapeHtml(e.message)}</div>`;
  }
}

function renderChips() {
  let html = `<button class="chip active" data-filter="all">All <span class="count">${SERVICES.length}</span></button>`;
  COMPANIES.forEach(c => {
    const n = SERVICES.filter(s => s.company_key === c.key).length;
    if (!n) return;
    const short = c.name.replace(' Studio', '').replace(' Digital', '');
    html += `<button class="chip" data-filter="${c.key}">${escapeHtml(short)} <span class="count">${n}</span></button>`;
  });
  chipsWrap.innerHTML = html;
  chipsWrap.querySelectorAll('.chip').forEach(c => c.addEventListener('click', () => {
    chipsWrap.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    activeFilter = c.dataset.filter;
    render();
  }));
}

function render() {
  const q = search.value.trim().toLowerCase();
  let totalShown = 0;
  root.innerHTML = '';
  COMPANIES.forEach(co => {
    if (activeFilter !== 'all' && co.key !== activeFilter) return;
    const items = SERVICES
      .filter(s => s.company_key === co.key)
      .filter(s => !q || `${s.name} ${s.description}`.toLowerCase().includes(q));
    if (!items.length) return;
    totalShown += items.length;
    const cards = items.map(s => `
      <div class="svc-card ${s.is_default ? 'default-tag' : ''}">
        <div class="svc-name">${escapeHtml(s.name)}</div>
        <div class="svc-desc">${escapeHtml(s.description)}</div>
        <div class="svc-meta">
          <div class="svc-rate"><span class="from">From</span>${escapeHtml(fmtRate(s.rate_amount, s.rate_unit, s.rate_note))}</div>
        </div>
        <div class="svc-actions">
          <button data-edit="${s.id}">Edit</button>
          <button data-dup="${s.id}">Duplicate</button>
        </div>
      </div>`).join('');
    root.insertAdjacentHTML('beforeend', `
      <div class="co-group" data-co="${co.key}">
        <div class="co-header">
          <h2>${escapeHtml(co.name)}</h2>
          <span class="cat">${escapeHtml(co.category || '')}</span>
          <span class="count-badge">${items.length} service${items.length === 1 ? '' : 's'}</span>
        </div>
        <div class="svc-grid">${cards}</div>
      </div>`);
  });
  empty.classList.toggle('hidden', totalShown > 0);
}

search.addEventListener('input', render);
</script>

</body>
</html>
